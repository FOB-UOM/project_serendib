name: Dataset Iteration

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag for quality report (e.g., v0.2)"
        required: true
        default: "v0.2"
  schedule:
    - cron: "0 18 * * 5"

permissions:
  contents: read

jobs:
  iterate-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate data contracts and seed datasets
        run: |
          python shared/scripts/validate_pillar_records.py --root .

      - name: Build moderation queue artifact
        run: |
          python shared/scripts/argilla_pipeline_cli.py build-queue

      - name: Generate release quality report
        run: |
          python shared/scripts/release_engine.py --root . --tag "${{ github.event.inputs.release_tag || 'v0.2' }}"

      - name: Upload release report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: serendib-release-quality-report
          path: docs/releases/**/quality-report.json
