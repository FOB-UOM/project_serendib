name: HF Sync

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hf-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Release snapshot stub (pre-HF sync artifact)
        run: |
          python shared/scripts/release_engine.py --root . --tag v0.1
