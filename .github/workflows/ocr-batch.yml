name: OCR Batch

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ocr-batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: OCR batch confidence loop
        run: |
          python shared/ocr-pipeline/batch.py --incoming shared/ocr-pipeline/incoming --threshold 0.7
