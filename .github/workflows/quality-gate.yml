name: Quality Gate

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Structure sanity checks
        run: |
          test -d pillar-education-human-development
          test -d pillar-economy-enterprise
          test -d pillar-society-environment
          test -d shared/ocr-pipeline
          test -f PROPOSAL-v2.md
          test -f platform/api.py
          test -f docs/PRODUCTION-AUDIT.md
          python shared/scripts/validate_pillar_records.py --root .
          echo "Quality gate passed"
