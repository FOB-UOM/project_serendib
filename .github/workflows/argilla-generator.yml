name: Argilla Generator

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  argilla-generator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Build moderation queue and export approved
        run: |
          python shared/scripts/argilla_pipeline_cli.py build-queue
          python shared/scripts/argilla_pipeline_cli.py export-approved
