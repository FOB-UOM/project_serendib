name: OCR Batch

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ocr-batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: OCR batch stub
        run: |
          python shared/ocr-pipeline/cli.py sample_scan --mode auto
